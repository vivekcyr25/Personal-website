<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>✓ My Tasks</h1>

            <!-- Input Section -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button id="filterAll" class="filter-btn active">All</button>
                <button id="filterActive" class="filter-btn">Active</button>
                <button id="filterCompleted" class="filter-btn">Completed</button>
            </div>

            <!-- Todo List -->
            <ul id="todoList" class="todo-list"></ul>

            <!-- Statistics -->
            <div class="todo-stats">
                <div>
                    Total Tasks: <span id="totalTasks">0</span>
                </div>
                <div>
                    Active: <span id="activeTasks">0</span>
                </div>
                <div>
                    Completed: <span id="completedTasks">0</span>
                </div>
                <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
